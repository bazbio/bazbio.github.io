<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>곳간</title>
<meta name="theme-color" content="#0E8C4A">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="곳간">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { height:100%; overflow:hidden; background:#F5F5F7; }
  #app { position:fixed; inset:0; width:100%; height:100%; border:0; }

  /* ── 스플래시: 워드마크가 선명해지고 아래에 동전 세 닢이 쌓이는 인트로 ── */
  #load { position:fixed; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;
          background:#FFFFFF; z-index:10; transition:opacity .5s ease; }

  .wm { font-family:-apple-system,'Malgun Gothic','Apple SD Gothic Neo',sans-serif;
        font-size:min(19vw,96px); font-weight:800; line-height:1;
        background:linear-gradient(120deg,#12A75C 25%,#075D33 90%);
        -webkit-background-clip:text; background-clip:text;
        -webkit-text-fill-color:transparent; color:#0E8C4A;
        animation:focusin 1.8s cubic-bezier(.16,1,.3,1) both; }

  .coins { margin-top:22px; display:flex; flex-direction:column-reverse; align-items:center; gap:5px; height:52px; }
  .coins i { display:block; width:44px; height:12px; border-radius:99px;
             background:linear-gradient(180deg,#F7D264,#E8AE1F); border:1.5px solid #D99E12;
             opacity:0; transform:translateY(-26px) scale(.85); }
  .coins i:nth-child(1) { animation:drop .45s cubic-bezier(.2,1.4,.4,1) 1.30s forwards; }
  .coins i:nth-child(2) { animation:drop .45s cubic-bezier(.2,1.4,.4,1) 1.55s forwards; }
  .coins i:nth-child(3) { animation:drop .45s cubic-bezier(.2,1.4,.4,1) 1.80s forwards, glint 2.4s ease-in-out 2.5s infinite; }

  .sub { margin-top:20px; font-family:-apple-system,'Malgun Gothic',sans-serif;
         font-size:14px; font-weight:600; color:#B9B9C0; letter-spacing:.42em; text-indent:.42em;
         opacity:0; animation:subin 1.1s ease 1.5s forwards; }

  @keyframes focusin {
    0%   { opacity:0; letter-spacing:.34em; filter:blur(14px); transform:scale(1.06); }
    55%  { opacity:1; }
    100% { opacity:1; letter-spacing:-.02em; filter:blur(0); transform:scale(1); }
  }
  @keyframes drop { from { opacity:0; transform:translateY(-26px) scale(.85); } to { opacity:1; transform:none; } }
  @keyframes glint {
    0%,100% { box-shadow:0 0 0 0 rgba(232,174,31,.4); }
    50%     { box-shadow:0 0 0 8px rgba(232,174,31,0); }
  }
  @keyframes subin { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }
</style>
</head>
<body>
<div id="load">
  <div class="wm">곳간</div>
  <div class="coins"><i></i><i></i><i></i></div>
  <div class="sub">BAZ BIOMEDIC</div>
</div>
<iframe id="app" src="https://script.google.com/macros/s/AKfycbxxjXS8Tc2624n5gP2_snZ70TDxhNeTbXdlfdiuTQpauF8eWMTdtyZ5lBOMCJS095lF/exec"
        allow="clipboard-write" onload="appReady()"></iframe>
<script>
  var T0 = Date.now();
  function appReady() {
    // 애니메이션이 최소 3.2초는 보이도록, 로딩이 오래 걸리면 즉시 전환
    var wait = Math.max(0, 3200 - (Date.now() - T0));
    setTimeout(function () {
      var l = document.getElementById('load');
      l.style.opacity = 0;
      setTimeout(function () { l.style.display = 'none'; }, 450);
    }, wait);
  }
  if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js').catch(function () {}); }
</script>
</body>
</html>
