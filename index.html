<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>BAZ 업무 포털</title>
<meta name="theme-color" content="#0A57C2">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%230A57C2'/%3E%3Ctext x='32' y='44' font-family='Arial' font-size='34' font-weight='800' fill='white' text-anchor='middle'%3EB%3C/text%3E%3C/svg%3E">
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { min-height:100%; }
  body {
    font-family:-apple-system,'Malgun Gothic','Apple SD Gothic Neo',sans-serif;
    background:#F2F2F7; color:#1C1C1E;
    display:flex; flex-direction:column; align-items:center;
    padding:max(40px,env(safe-area-inset-top)) 20px 40px;
  }
  .brand { text-align:center; margin-bottom:8px; }
  .brand h1 {
    font-size:28px; font-weight:800; letter-spacing:-.02em;
    background:linear-gradient(120deg,#0A84FF 15%,#0A57C2 85%);
    -webkit-background-clip:text; background-clip:text;
    -webkit-text-fill-color:transparent; color:#0A57C2;
  }
  .brand p { margin-top:6px; font-size:12.5px; font-weight:600; color:#B0B0B6; letter-spacing:.34em; text-indent:.34em; }
  .date { margin-top:14px; font-size:13px; color:#8E8E93; }

  .cards { width:100%; max-width:560px; margin-top:28px; display:flex; flex-direction:column; gap:16px; }

  .card {
    display:flex; align-items:center; gap:16px; text-decoration:none; color:inherit;
    background:#FFFFFF; border-radius:20px; padding:22px 20px;
    box-shadow:0 2px 12px rgba(0,0,0,.06);
    transition:transform .15s ease, box-shadow .15s ease;
  }
  .card:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(0,0,0,.10); }
  .card:active { transform:scale(.98); }

  .mark {
    flex:0 0 56px; height:56px; border-radius:15px;
    display:flex; align-items:center; justify-content:center;
    font-size:24px; font-weight:800; color:#fff; position:relative;
  }
  .mark.saleson { background:linear-gradient(135deg,#0A84FF,#0A57C2); }
  .mark.saleson::after {
    content:''; position:absolute; top:9px; right:9px; width:8px; height:8px;
    border-radius:50%; background:#3ED07E;
  }
  .mark.bridge { background:linear-gradient(135deg,#1C69D4,#1A2129); }

  .info { flex:1; min-width:0; }
  .info .name { font-size:18px; font-weight:700; letter-spacing:-.01em; }
  .info .desc { margin-top:4px; font-size:13.5px; color:#8E8E93; line-height:1.45; }

  .go {
    flex:0 0 auto; width:34px; height:34px; border-radius:50%;
    background:#F2F2F7; display:flex; align-items:center; justify-content:center;
    color:#0A57C2; font-size:16px; font-weight:700;
  }

  footer { margin-top:auto; padding-top:48px; font-size:11.5px; color:#C4C4CA; text-align:center; line-height:1.7; }
</style>
</head>
<body>

<div class="brand">
  <h1>BAZ 업무 포털</h1>
  <p>BAZ BIOMEDIC</p>
</div>
<div class="date" id="today"></div>

<div class="cards">

  <a class="card" href="https://jjang1999-svg.github.io/saleson/" target="_blank" rel="noopener">
    <div class="mark saleson">S</div>
    <div class="info">
      <div class="name">SalesON</div>
      <div class="desc">국내영업 CRM — 거래처 · 리드 · 일정 · 실적 관리</div>
    </div>
    <div class="go">›</div>
  </a>

  <a class="card" href="https://script.google.com/macros/s/AKfycbx9Y99D3BdLucPbmYVb14Go7fOhtnIXQ7namenu9zRe0BWXL6rV4vCD2eCuWx4He21fqw/exec" target="_blank" rel="noopener">
    <div class="mark bridge">B</div>
    <div class="info">
      <div class="name">브리지</div>
      <div class="desc">업무지시 플랫폼 — 지시 등록 · 답변 · 기한 회신 · 미팅 요청</div>
    </div>
    <div class="go">›</div>
  </a>

</div>

<footer>
  새 플랫폼이 생기면 이 페이지에 계속 추가됩니다.<br>
  BAZ BIOMEDIC · 업무 포털
</footer>

<script>
  var d = new Date();
  var days = ['일','월','화','수','목','금','토'];
  document.getElementById('today').textContent =
    d.getFullYear() + '년 ' + (d.getMonth()+1) + '월 ' + d.getDate() + '일 (' + days[d.getDay()] + ')';
</script>
</body>
</html>
