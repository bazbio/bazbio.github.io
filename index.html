<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { min-height:100%; }
  body {
    font-family:-apple-system,'Malgun Gothic','Apple SD Gothic Neo',sans-serif;
    background:#F2F2F7; color:#1C1C1E;
    display:flex; flex-direction:column; align-items:center;
    padding:max(40px,env(safe-area-inset-top)) 20px 40px;
  }
  .brand { text-align:center; margin-bottom:8px; }
  .brand h1 {
    font-size:28px; font-weight:800; letter-spacing:-.02em;
    background:linear-gradient(120deg,#0A84FF 15%,#0A57C2 85%);
    -webkit-background-clip:text; background-clip:text;
    -webkit-text-fill-color:transparent; color:#0A57C2;
  }
  .brand p { margin-top:6px; font-size:12.5px; font-weight:600; color:#B0B0B6; letter-spacing:.34em; text-indent:.34em; }
  .date { margin-top:14px; font-size:13px; color:#8E8E93; }

  .cards { width:100%; max-width:720px; margin-top:28px; display:flex; flex-direction:column; gap:16px; }

  .card {
    display:flex; align-items:center; gap:16px; text-decoration:none; color:inherit;
    background:#FFFFFF; border-radius:20px; padding:22px 20px;
    box-shadow:0 2px 12px rgba(0,0,0,.06);
    transition:transform .15s ease, box-shadow .15s ease;
  }
  .card:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(0,0,0,.10); }
  .card:active { transform:scale(.98); }

  .mark {
    flex:0 0 56px; height:56px; border-radius:15px;
    display:flex; align-items:center; justify-content:center;
    font-size:24px; font-weight:800; color:#fff; position:relative;
  }
  .mark.saleson { background:linear-gradient(135deg,#0A84FF,#0A57C2); }
  .mark.saleson::after {
    content:''; position:absolute; top:9px; right:9px; width:8px; height:8px;
    border-radius:50%; background:#3ED07E;
  }
  .mark.bridge { background:linear-gradient(135deg,#1C69D4,#1A2129); }
  .mark.budget { background:linear-gradient(135deg,#12A75C,#075D33); }
  .mark.budget::after {
    content:''; position:absolute; top:9px; right:9px; width:8px; height:8px;
    border-radius:50%; background:#F5C542;
  }

  .info { flex:1; min-width:0; }
  .info .name { font-size:18px; font-weight:700; letter-spacing:-.01em; }
  .info .desc {
    margin-top:7px; font-size:13px; color:#98989E; line-height:1.5;
    display:flex; align-items:center; gap:9px; flex-wrap:wrap;
  }
  .cat {
    flex:none; font-size:11.5px; font-weight:700; letter-spacing:.01em;
    padding:3px 9px; border-radius:999px;
  }
  .cat.saleson { color:#0A57C2; background:rgba(10,132,255,.10); }
  .cat.bridge  { color:#1C69D4; background:rgba(28,105,212,.10); }
  .cat.budget  { color:#0E7A3C; background:rgba(52,199,123,.13); }

  .go {
    flex:0 0 auto; width:34px; height:34px; border-radius:50%;
    background:#F2F2F7; display:flex; align-items:center; justify-content:center;
    color:#0A57C2; font-size:16px; font-weight:700;
  }

  .appqr {
    flex:0 0 auto; display:flex; flex-direction:column; align-items:center; gap:5px;
    padding:7px 7px 5px; background:#FFFFFF; border:1px solid #ECECF0; border-radius:12px;
  }
  .appqr svg { width:72px; height:72px; display:block; }
  .appqr span { font-size:9.5px; font-weight:700; color:#B0B0B6; letter-spacing:.08em; }
  @media (max-width:480px) { .appqr { display:none; } }  /* 폰에서는 카드 터치로 바로 이동 */

  footer { margin-top:auto; padding-top:48px; font-size:11.5px; color:#C4C4CA; text-align:center; line-height:1.7; }
</style>
