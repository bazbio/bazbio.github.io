name: 업계 뉴스 갱신

on:
  schedule:
    - cron: '0 22 * * *'   # 매일 07:00 KST
  workflow_dispatch:        # 수동 실행 버튼

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: 뉴스 수집
        run: node scripts/fetch-news.mjs
      - name: 커밋 및 푸시
        run: |
          git config user.name "news-bot"
          git config user.email "actions@github.com"
          git add news.json
          git diff --cached --quiet || git commit -m "업계 뉴스 자동 갱신"
          git push
